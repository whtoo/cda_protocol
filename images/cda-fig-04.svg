<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 280" font-family="system-ui, sans-serif">
  <defs>
    <linearGradient id="heatGrad" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0%" stop-color="#e03131"/><stop offset="50%" stop-color="#fd7e14"/><stop offset="100%" stop-color="#e03131"/>
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="500" height="280" rx="6" fill="#f8f9fa"/>
  <text x="250" y="22" text-anchor="middle" font-size="14" font-weight="bold" fill="#212529">语义梯度分布</text>
  
  <!-- 坐标 -->
  <line x1="50" y1="220" x2="450" y2="220" stroke="#adb5bd" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="50" y1="220" x2="50" y2="40" stroke="#adb5bd" stroke-width="1.5"/>
  <text x="450" y="240" text-anchor="middle" font-size="11" fill="#495057">上下文序列</text>
  <text x="25" y="130" text-anchor="middle" font-size="11" fill="#495057" transform="rotate(-90,25,130)">语义方向 D ↑</text>
  
  <!-- 高耦合区域柱状 -->
  <rect x="80" y="80" width="30" height="140" fill="#e03131" opacity="0.8" rx="2"/>
  <rect x="140" y="100" width="30" height="120" fill="#e03131" opacity="0.7" rx="2"/>
  <rect x="200" y="60" width="30" height="160" fill="#e03131" opacity="0.9" rx="2"/>
  <rect x="260" y="130" width="30" height="90" fill="#fd7e14" opacity="0.5" rx="2"/>
  <rect x="320" y="160" width="30" height="60" fill="#fab005" opacity="0.3" rx="2"/>
  <rect x="380" y="180" width="30" height="40" fill="#fab005" opacity="0.2" rx="2"/>
  
  <text x="95" y="70" text-anchor="middle" font-size="10" fill="#c92a2a">高耦合</text>
  <text x="215" y="50" text-anchor="middle" font-size="10" fill="#c92a2a">高耦合</text>
  <text x="335" y="155" text-anchor="middle" font-size="10" fill="#e67700">低耦合</text>
  <text x="395" y="175" text-anchor="middle" font-size="10" fill="#e67700">稀疏</text>
  
  <text x="250" y="265" text-anchor="middle" font-size="11" fill="#868e96">图：证据-论点耦合方向上的语义梯度</text>
</svg>