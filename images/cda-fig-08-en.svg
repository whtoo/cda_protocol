<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 650 220" font-family="system-ui, sans-serif">
  <defs>
    <marker id="arrowSCG" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#495057"/></marker>
  </defs>
  <rect x="0" y="0" width="650" height="220" rx="8" fill="#f8f9fa"/>
  <text x="325" y="22" text-anchor="middle" font-size="14" font-weight="bold" fill="#212529">SCG Semantic Topology-Preserving Compression Pipeline</text>
  
  <!-- 步骤 -->
  <rect x="20" y="45" width="100" height="40" rx="4" fill="#e7f5ff" stroke="#74c0fc"/>
  <text x="70" y="70" text-anchor="middle" font-size="11" fill="#1864ab">Raw Context</text>
  
  <line x1="120" y1="65" x2="145" y2="65" stroke="#495057" stroke-width="1.5" marker-end="url(#arrowSCG)"/>
  
  <rect x="150" y="45" width="110" height="40" rx="4" fill="#fff3bf" stroke="#ffc078"/>
  <text x="205" y="65" text-anchor="middle" font-size="10" fill="#e67700">Chunking + Embedding</text>
  <text x="205" y="78" text-anchor="middle" font-size="8" fill="#868e96">[p1, p2, ... pn]</text>
  
  <line x1="260" y1="65" x2="285" y2="65" stroke="#495057" stroke-width="1.5" marker-end="url(#arrowSCG)"/>
  
  <rect x="290" y="45" width="110" height="40" rx="4" fill="#d3f9d8" stroke="#8ce99a"/>
  <text x="345" y="65" text-anchor="middle" font-size="10" fill="#2b8a3e">Build Semantic Graph</text>
  <text x="345" y="78" text-anchor="middle" font-size="8" fill="#868e96">Nodes + Edges (semantic relations)</text>
  
  <line x1="400" y1="65" x2="425" y2="65" stroke="#495057" stroke-width="1.5" marker-end="url(#arrowSCG)"/>
  
  <rect x="430" y="45" width="100" height="40" rx="4" fill="#f3f0ff" stroke="#b197fc"/>
  <text x="480" y="65" text-anchor="middle" font-size="10" fill="#6741d9">Preserve Core Topology</text>
  <text x="480" y="78" text-anchor="middle" font-size="8" fill="#868e96">Compress edges and nodes</text>
  
  <line x1="530" y1="65" x2="555" y2="65" stroke="#495057" stroke-width="1.5" marker-end="url(#arrowSCG)"/>
  
  <rect x="560" y="45" width="70" height="40" rx="4" fill="#ffe3e3" stroke="#ffa8a8"/>
  <text x="595" y="70" text-anchor="middle" font-size="11" fill="#e03131">decode</text>
  
  <!-- 示例图 -->
  <text x="325" y="125" text-anchor="middle" font-size="11" fill="#495057">Before compression: full semantic relation graph</text>
  <circle cx="200" cy="165" r="12" fill="#74c0fc"/>
  <circle cx="260" cy="155" r="12" fill="#74c0fc"/>
  <circle cx="310" cy="175" r="12" fill="#74c0fc"/>
  <circle cx="360" cy="155" r="12" fill="#74c0fc"/>
  <circle cx="420" cy="165" r="12" fill="#74c0fc"/>
  <line x1="212" y1="165" x2="248" y2="157" stroke="#adb5bd" stroke-width="1.5"/>
  <line x1="272" y1="157" x2="298" y2="171" stroke="#adb5bd" stroke-width="1.5"/>
  <line x1="322" y1="171" x2="348" y2="158" stroke="#adb5bd" stroke-width="1.5"/>
  <line x1="372" y1="158" x2="408" y2="165" stroke="#adb5bd" stroke-width="1.5"/>
  <text x="310" y="195" text-anchor="middle" font-size="10" fill="#868e96">After compression: key nodes and edges retained, logical relations intact</text>
  
  <text x="325" y="212" text-anchor="middle" font-size="9" fill="#adb5bd">Fig: SCG Preserves Semantic Topology During Compression</text>
</svg>