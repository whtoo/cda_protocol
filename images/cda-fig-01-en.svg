<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 220" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <linearGradient id="gBad" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#ff8787"/><stop offset="100%" stop-color="#e03131"/></linearGradient>
    <linearGradient id="gGood" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#69db7c"/><stop offset="100%" stop-color="#2f9e44"/></linearGradient>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%"><feDropShadow dx="1" dy="2" stdDeviation="3" flood-opacity="0.15"/></filter>
  </defs>
  <rect x="0" y="0" width="800" height="220" rx="12" fill="#f8f9fa"/>
  
  <!-- 左侧：容量思维 -->
  <rect x="30" y="30" width="340" height="160" rx="10" fill="white" stroke="#e03131" stroke-width="2" filter="url(#shadow)"/>
  <text x="200" y="60" text-anchor="middle" font-size="16" font-weight="bold" fill="#e03131">❌ Capacity Thinking: What to store?</text>
  <!-- 漏斗逐渐变大 -->
  <polygon points="140,80 260,80 300,140 100,140" fill="none" stroke="#e03131" stroke-width="2" stroke-dasharray="6,3"/>
  <polygon points="120,95 280,95 320,160 80,160" fill="none" stroke="#e03131" stroke-width="2.5" stroke-dasharray="6,3"/>
  <polygon points="100,110 300,110 340,180 60,180" fill="url(#gBad)" opacity="0.7"/>
  <text x="200" y="150" text-anchor="middle" font-size="13" fill="#c92a2a">Infinite window expansion / Store more info</text>
  <text x="200" y="175" text-anchor="middle" font-size="12" fill="#868e96">RAG · MemGPT · Long Context</text>

  <!-- 中间箭头 -->
  <text x="400" y="115" text-anchor="middle" font-size="28" font-weight="bold" fill="#495057">→</text>

  <!-- 右侧：方向思维 -->
  <rect x="430" y="30" width="340" height="160" rx="10" fill="white" stroke="#2f9e44" stroke-width="2" filter="url(#shadow)"/>
  <text x="600" y="60" text-anchor="middle" font-size="16" font-weight="bold" fill="#2f9e44">✅ Direction Thinking: When · Which direction?</text>
  <!-- 对准靶心的漏斗 -->
  <circle cx="600" cy="150" r="28" fill="none" stroke="#2f9e44" stroke-width="2"/>
  <circle cx="600" cy="150" r="12" fill="#2f9e44" opacity="0.4"/>
  <polygon points="540,90 660,90 620,135 580,135" fill="url(#gGood)" opacity="0.8"/>
  <line x1="600" y1="90" x2="600" y2="120" stroke="white" stroke-width="2"/>
  <text x="600" y="175" text-anchor="middle" font-size="13" fill="#2b8a3e">Precisely align evidence-thesis direction</text>
  <text x="600" y="195" text-anchor="middle" font-size="12" fill="#868e96">CDA · Semantic Direction · Negative Guarantee</text>

  <!-- 底部结论 -->
  <text x="400" y="212" text-anchor="middle" font-size="11" fill="#adb5bd">Fig: Capacity Thinking vs Direction Thinking — CDA's Paradigm Shift</text>
</svg>