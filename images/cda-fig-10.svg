<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 650 300" font-family="system-ui, sans-serif">
  <defs>
    <linearGradient id="barBad" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#ff8787"/><stop offset="100%" stop-color="#e03131"/></linearGradient>
    <linearGradient id="barMid" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#ffd43b"/><stop offset="100%" stop-color="#f59f00"/></linearGradient>
    <linearGradient id="barGood" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#69db7c"/><stop offset="100%" stop-color="#2f9e44"/></linearGradient>
  </defs>
  <rect x="0" y="0" width="650" height="300" rx="8" fill="#f8f9fa"/>
  <text x="325" y="22" text-anchor="middle" font-size="14" font-weight="bold" fill="#212529">Phase-aware vs 非 Phase-aware 上下文使用率对比</text>
  
  <!-- Y轴 -->
  <line x1="80" y1="40" x2="80" y2="250" stroke="#adb5bd" stroke-width="1.5"/>
  <line x1="80" y1="250" x2="600" y2="250" stroke="#adb5bd" stroke-width="1.5"/>
  
  <!-- 100% 参考线 -->
  <line x1="80" y1="90" x2="600" y2="90" stroke="#e03131" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="70" y="94" text-anchor="end" font-size="10" fill="#e03131">100%</text>
  
  <!-- 柱子 -->
  <rect x="120" y="90" width="80" height="160" fill="url(#barBad)" rx="4"/>
  <text x="160" y="85" text-anchor="middle" font-size="13" font-weight="bold" fill="#c92a2a">111.9%</text>
  <text x="160" y="265" text-anchor="middle" font-size="11" fill="#495057">非Phase-aware</text>
  <text x="160" y="280" text-anchor="middle" font-size="9" fill="#868e96">839条全量</text>
  
  <rect x="260" y="162" width="80" height="88" fill="url(#barMid)" rx="4"/>
  <text x="300" y="157" text-anchor="middle" font-size="13" font-weight="bold" fill="#e67700">44.2%</text>
  <text x="300" y="265" text-anchor="middle" font-size="11" fill="#495057">Phase-aware (fix前)</text>
  <text x="300" y="280" text-anchor="middle" font-size="9" fill="#868e96">219条/compact loop</text>
  
  <rect x="400" y="175" width="80" height="75" fill="url(#barGood)" rx="4"/>
  <text x="440" y="170" text-anchor="middle" font-size="13" font-weight="bold" fill="#2b8a3e">28-40%</text>
  <text x="440" y="265" text-anchor="middle" font-size="11" fill="#495057">Phase-aware (fix后)</text>
  <text x="440" y="280" text-anchor="middle" font-size="9" fill="#868e96">90条/稳定</text>
  
  <!-- 标注 -->
  <text x="160" y="75" text-anchor="middle" font-size="10" fill="#c92a2a">溢出崩溃</text>
  <text x="440" y="165" text-anchor="middle" font-size="10" fill="#2b8a3e">稳定运行</text>
  
  <text x="325" y="295" text-anchor="middle" font-size="9" fill="#adb5bd">图：同一会话下，Phase-aware 使上下文使用率从 111.9% 降至 28-40%</text>
</svg>